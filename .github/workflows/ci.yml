name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets
      # The default backend is CPU, so the whole suite -- real forward and
      # backward passes included -- runs on a hosted runner.
      - run: cargo test --all-targets
      - run: cargo run --release -- budget tiny

  # The custom CubeCL kernel cannot be exercised on the pure-Rust `flex` backend
  # the `check` job uses. The CubeCL CPU runtime (`cpu` feature) is the same
  # runtime family as the GPU backends, only LLVM-targeted, so it runs a real
  # `#[cube]` kernel on a GPU-less runner. This job checks the fused RMSNorm
  # kernel against its plain-arithmetic reference there (`tests/cubecl_cpu.rs`).
  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # SPIR-V/WGSL toolchains are not needed: the CPU runtime JITs through LLVM,
      # which the toolchain already ships.
      - run: cargo test --features cpu --test cubecl_cpu -- --nocapture
        env:
          BURN_DEVICE: cpu

  smoke:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The pipeline end to end on a synthetic corpus: the bugs this catches
      # (vocabulary mismatches, checkpoint collisions) are invisible to unit
      # tests because they live between the commands.
      - run: examples/smoke.sh
