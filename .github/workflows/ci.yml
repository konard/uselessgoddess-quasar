name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets
      # The default backend is CPU, so the whole suite -- real forward and
      # backward passes included -- runs on a hosted runner.
      - run: cargo test --all-targets
      - run: cargo run --release -- budget tiny

  # A synchronized production-shape optimizer step on the maintainer's GPU.
  # One complete step is discarded for fusion/autotune warm-up; each measured
  # three-step window is well below the issue's one-minute experiment budget.
  gpu-benchmark:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Record GPU runtime
        run: |
          rocminfo | grep -m1 -E 'Name:.*gfx'
          rocm-smi --showproductname --showmeminfo vram
      # The shape A/B selected wide-turbo at batch 4. Repeat fp32 beside the
      # reduced-precision probes so driver/load variation stays paired.
      - name: Vulkan wide-turbo fp32
        working-directory: experiments/single-stream
        run: >-
          cargo run --manifest-path ../../Cargo.toml --release
          --no-default-features --features vulkan --example train_bench --
          --model wide-turbo --micro-batch 4 --accum 12 --warmup 1 --steps 3
          --dtype f32 --ssd serial --checkpointing false --muon true
      # Burn has no automatic mixed precision: these make parameters,
      # activations and optimizer state low-precision. A finite short run is an
      # upper-bound experiment, not sufficient evidence for a training default.
      - name: Vulkan wide-turbo bf16 probe
        continue-on-error: true
        working-directory: experiments/single-stream
        run: >-
          cargo run --manifest-path ../../Cargo.toml --release
          --no-default-features --features vulkan --example train_bench --
          --model wide-turbo --micro-batch 4 --accum 12 --warmup 1 --steps 3
          --dtype bf16 --ssd serial --checkpointing false --muon true
      - name: Vulkan wide-turbo f16 probe
        continue-on-error: true
        working-directory: experiments/single-stream
        run: >-
          cargo run --manifest-path ../../Cargo.toml --release
          --no-default-features --features vulkan --example train_bench --
          --model wide-turbo --micro-batch 4 --accum 12 --warmup 1 --steps 3
          --dtype f16 --ssd serial --checkpointing false --muon true
      # Profiling inserts a timestamp around every launch and therefore uses
      # one micro-batch only. Its synchronized summary identifies kernel classes
      # and launch counts; it is intentionally not a throughput measurement.
      - name: CubeCL kernel profile — wide-turbo fp32
        working-directory: experiments/profile
        run: >-
          cargo run --manifest-path ../../Cargo.toml --release
          --no-default-features --features vulkan --example train_bench --
          --model wide-turbo --micro-batch 1 --accum 1 --warmup 1 --steps 1
          --dtype f32 --ssd serial --checkpointing false --muon true

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The pipeline end to end on a synthetic corpus: the bugs this catches
      # (vocabulary mismatches, checkpoint collisions) are invisible to unit
      # tests because they live between the commands.
      - run: examples/smoke.sh
