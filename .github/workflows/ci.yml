name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets
      # The default backend is CPU, so the whole suite -- real forward and
      # backward passes included -- runs on a hosted runner.
      - run: cargo test --all-targets
      - run: cargo run --release -- budget tiny
      - run: cargo run --release -- budget tiny-turbo

  # A synchronized production-shape optimizer step on the maintainer's GPU.
  # One complete step is discarded for fusion/autotune warm-up; each measured
  # three-step window is well below the issue's one-minute experiment budget.
  gpu-benchmark:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Record GPU runtime
        run: |
          rocminfo | grep -m1 -E 'Name:.*gfx'
          rocm-smi --showproductname --showmeminfo vram
      # This is the actual preset recipe, including the compute-efficient
      # 131072-token batch. The root cubecl.toml supplies the measured stream
      # limit; every performance argument stays explicit in the log.
      - name: Vulkan tiny-turbo production recipe
        run: >-
          cargo run --release --no-default-features --features vulkan
          --example train_bench --
          --model tiny-turbo --micro-batch 4 --accum 32 --warmup 1 --steps 3
          --dtype f32 --ssd serial --checkpointing false --muon true

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The pipeline end to end on a synthetic corpus: the bugs this catches
      # (vocabulary mismatches, checkpoint collisions) are invisible to unit
      # tests because they live between the commands.
      - run: examples/smoke.sh
